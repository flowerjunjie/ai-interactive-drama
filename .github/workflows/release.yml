name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true
        default: "v0.0.0"

permissions:
  contents: write   # create Release + upload assets

jobs:
  build-backend:
    name: Build backend artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruoyi-fastapi-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: ruoyi-fastapi-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint check
        run: |
          pip install ruff black isort
          ruff check .
          black --check .

      - name: Package backend (source-only, no build artifact)
        run: |
          mkdir -p ../dist/backend
          tar --exclude='.venv' --exclude='__pycache__' \
              --exclude='*.pyc' --exclude='.pytest_cache' \
              --exclude='node_modules' \
              -czf ../dist/backend/ai-interactive-drama-backend-${{ github.ref_name }}.tar.gz \
              .

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-source-${{ github.ref_name }}
          path: dist/backend/*.tar.gz
          retention-days: 30

  build-admin:
    name: Build admin frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruoyi-fastapi-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: ruoyi-fastapi-frontend/package-lock.json

      - run: npm install --registry=https://registry.npmmirror.com
      - run: npm run build:prod

      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist-${{ github.ref_name }}
          path: ruoyi-fastapi-frontend/dist
          retention-days: 30

  build-mobile:
    name: Build mobile (H5)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm install --registry=https://registry.npmmirror.com
      - run: pnpm build:h5 || pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-h5-${{ github.ref_name }}
          path: mobile-app/dist/build/h5
          if-no-files-found: warn
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs: [build-backend, build-admin, build-mobile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifact tree
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/dist/**
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    needs: publish-release
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Echo success
        run: |
          echo "✅ Released ${{ github.ref_name }}"
          echo "Artifacts: backend source + admin dist + mobile H5"
          echo "View at: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"