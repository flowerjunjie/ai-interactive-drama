name: Sync Labels

on:
  push:
    paths:
      - ".github/labels.yml"
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  labels:
    name: Sync labels from .github/labels.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run labeler
        uses: github-actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}