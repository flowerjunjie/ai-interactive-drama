name: CI

on:
  push:
    branches: [main, backup/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────
  # 后端 · Python lint
  # ───────────────────────────────────────────────
  backend-lint:
    name: Backend · Lint (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruoyi-fastapi-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: ruoyi-fastapi-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort

      - name: Ruff (lint)
        run: ruff check . --output-format=github

      - name: Black (format check)
        run: black --check --diff .

      - name: isort (import order)
        run: isort --check-only --diff .

  # ───────────────────────────────────────────────
  # 后端 · CLI 自检
  # ───────────────────────────────────────────────
  backend-doctor:
    name: Backend · ruoyi app doctor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruoyi-fastapi-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: ruoyi-fastapi-backend/requirements.txt
      - name: Install (no extras)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Show routes
        run: |
          python -c "import sys; sys.argv = ['ruoyi', 'app', 'routes', '--env=dev']" || \
            echo "(routes command may require full app bootstrap — skip on CI)"

  # ───────────────────────────────────────────────
  # 管理后台 · npm install + build
  # ───────────────────────────────────────────────
  frontend-build:
    name: Admin · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruoyi-fastapi-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: ruoyi-fastapi-frontend/package-lock.json

      - name: Install (npmmirror)
        run: npm install --registry=https://registry.npmmirror.com

      - name: Build (production)
        run: npm run build:prod

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: ruoyi-fastapi-frontend/dist/
          retention-days: 7

  # ───────────────────────────────────────────────
  # 移动端 · pnpm install + build
  # ───────────────────────────────────────────────
  mobile-build:
    name: Mobile · Build (H5)
    runs-on: ubuntu-latest
    defaults:
        run:
          working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install (npmmirror)
        run: pnpm install --registry=https://registry.npmmirror.com

      - name: Build H5
        run: pnpm build:h5

  # ───────────────────────────────────────────────
  # 文档 · Markdown sanity
  # ───────────────────────────────────────────────
  docs-lint:
    name: Docs · Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown link check (sample)
        run: |
          # 仅检查根目录 README 引用
          for f in README.md CONTRIBUTING.md ROADMAP.md SECURITY.md CODE_OF_CONDUCT.md; do
            [ -f "$f" ] || { echo "::warning::$f missing"; continue; }
            echo "OK: $f"
          done