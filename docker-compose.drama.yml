services:
  # ========== AI Interactive Drama Platform ==========

  # --- Unified Nginx (Admin + H5 + API + APK) ---
  drama-nginx:
    image: nginx:alpine
    container_name: drama-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ruoyi-fastapi-frontend/bin/nginx.drama.conf:/etc/nginx/conf.d/default.conf
      - ./ruoyi-fastapi-frontend/dist:/usr/share/nginx/html:ro
      - ./mobile-app/dist:/usr/share/nginx/h5:ro
      - ./download-page:/usr/share/nginx/download:ro
    networks:
      - drama-network

  # --- Backend API (FastAPI) ---
  drama-backend:
    build:
      context: ./ruoyi-fastapi-backend
      dockerfile: Dockerfile.my
    image: drama-backend:latest
    container_name: drama-backend
    ports:
      - "19199:9099"
    env_file:
      - ./ruoyi-fastapi-backend/.env.dockermy
    environment:
      DB_HOST: drama-mysql
      DB_DATABASE: ai_video
      DB_USERNAME: aivideo
      DB_PASSWORD: aivideo123
      REDIS_HOST: drama-redis
    depends_on:
      drama-mysql:
        condition: service_healthy
      drama-redis:
        condition: service_healthy
    networks:
      - drama-network

  # --- Mobile App H5 (served by nginx) ---
  # Note: H5 is now served via /h5/ path in drama-nginx
  # drama-h5:
  #   build:
  #     context: ./mobile-app/dist
  #     dockerfile: Dockerfile.h5
  #   image: drama-h5:latest
  #   container_name: drama-h5
  #   ports:
  #     - "8288:80"
  #   networks:
  #     - drama-network

  # --- MySQL 8.0 ---
  drama-mysql:
    image: mysql:8.0
    container_name: drama-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "13306:3306"
    volumes:
      - drama-mysql-data:/var/lib/mysql
      - ./ruoyi-fastapi-backend/sql/drama_tables_mvp_mysql.sql:/docker-entrypoint-initdb.d/1-drama-mvp.sql
      - ./ruoyi-fastapi-backend/sql/drama_tables_align_v2_mysql.sql:/docker-entrypoint-initdb.d/2-drama-align-v2.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --skip-character-set-client-handshake=1
    networks:
      - drama-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 30

  # --- Redis ---
  drama-redis:
    image: redis:7-alpine
    container_name: drama-redis
    ports:
      - "16379:6379"
    networks:
      - drama-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

# ========== Networks & Volumes ==========
networks:
  drama-network:
    name: drama-network
    driver: bridge

volumes:
  drama-mysql-data:
    name: drama-mysql-data